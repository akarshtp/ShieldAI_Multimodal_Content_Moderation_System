version: "3.9"

services:
  shieldai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shieldai-api
    ports:
      - "8000:8000"
    environment:
      - SHIELDAI_ENVIRONMENT=production
      - SHIELDAI_LOG_LEVEL=INFO
      - SHIELDAI_MODEL_DEVICE=cpu
      - SHIELDAI_API_HOST=0.0.0.0
      - SHIELDAI_API_PORT=8000
    volumes:
      # Persist model cache across restarts
      - model-cache:/home/shieldai/.cache/shieldai/models
      # Persist SQLite database
      - db-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/api/v1/health'); r.raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  model-cache:
    driver: local
  db-data:
    driver: local
